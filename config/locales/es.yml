    host:
      title: "Tu anfitrión"
      section_title: "Sencillo y sincero"
      image_alt: "Foto de tu anfitrión"
      body:
        p1: "Nacido y criado en Anglès, en el corazón del Tarn, Claude es un joven jubilado todavía impulsado por la energía de su primera vida: un restaurador apasionado. Amante de la naturaleza, caminante incansable y muy implicado en la vida del pueblo, le gusta compartir lo que hace especial a su región: la convivencia, la sencillez y una conexión íntima con los paisajes que la rodean."
        p2: "Siempre lleno de ideas para enriquecer la estancia de sus huéspedes, Claude conoce los senderos escondidos, los miradores tranquilos, las historias locales y las mejores direcciones de la zona. Guía, aconseja y cuenta anécdotas — siempre con entusiasmo."
        p3: "En la cocina, puede preparar cenas caseras bajo petición, inspiradas en productos locales. Platos sencillos y sinceros, pensados para favorecer la conversación alrededor de una mesa cálida."
        p4: "Ese mismo espíritu vive en su casa de huéspedes: un lugar acogedor y sin pretensiones, donde uno se siente inmediatamente “como en casa”. Tanto si buscas momentos amistosos como un retiro más tranquilo, Claude ofrecerá el equilibrio perfecto para una estancia auténtica y relajante."
      coming_soon: "Contenido disponible próximamente."
